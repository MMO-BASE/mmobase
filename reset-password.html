<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | MMOBase</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(76, 255, 169, 0.16), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.14), transparent 34rem),
        #050807;
      color: #f4fff8;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: rgba(8, 14, 12, 0.92);
      border: 1px solid rgba(148, 255, 192, 0.16);
      border-radius: 22px;
      padding: 30px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .brand img {
      width: 42px;
      height: 42px;
      border-radius: 12px;
    }

    .brand strong {
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    h1 {
      font-size: 28px;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    p {
      color: #9fb3a8;
      line-height: 1.6;
      margin-bottom: 22px;
      font-size: 14px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin: 14px 0 7px;
      color: #dfffee;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid rgba(148, 255, 192, 0.16);
      background: rgba(255, 255, 255, 0.045);
      color: #fff;
      outline: none;
      font-size: 15px;
    }

    input:focus {
      border-color: rgba(74, 222, 128, 0.75);
      box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.12);
    }

    button {
      width: 100%;
      margin-top: 20px;
      border: 0;
      border-radius: 14px;
      padding: 13px 16px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, #48f29a, #16a34a);
      color: #03110a;
      font-size: 15px;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .secondary {
      display: block;
      text-align: center;
      color: #8ef0ba;
      text-decoration: none;
      margin-top: 18px;
      font-size: 13px;
      font-weight: 700;
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.45;
      display: none;
    }

    .message.error {
      display: block;
      color: #fecaca;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.25);
    }

    .message.success {
      display: block;
      color: #bbf7d0;
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.25);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <img src="/favicon.png" alt="MMOBase">
      <strong>MMOBase</strong>
    </div>

    <h1>Reset your password</h1>
    <p>Enter a new password below. Once updated, you’ll be sent back to sign in.</p>

    <form id="resetForm">
      <label for="newPassword">New password</label>
      <input id="newPassword" type="password" minlength="8" autocomplete="new-password" required>

      <label for="confirmPassword">Confirm new password</label>
      <input id="confirmPassword" type="password" minlength="8" autocomplete="new-password" required>

      <button id="submitBtn" type="submit">Update password</button>
    </form>

    <div id="message" class="message"></div>

    <a class="secondary" href="/dashboard">Back to sign in</a>
  </main>

  <script>
    const SUPABASE_URL = 'https://rfswlpozpwcrlnpymbsr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmc3dscG96cHdjcmxucHltYnNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg1NDk3MTcsImV4cCI6MjA4NDEyNTcxN30._5pxb0WCJ0FBQ0_DA8BJjm5jCA9nxVDBn8IOGRjKnoI';
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('resetForm');
    const newPassword = document.getElementById('newPassword');
    const confirmPassword = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const message = document.getElementById('message');

    function showMessage(text, type) {
      message.textContent = text;
      message.className = 'message ' + type;
    }

    async function ensureRecoverySession() {
      const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      const accessToken = hash.get('access_token');
      const refreshToken = hash.get('refresh_token');

      if (accessToken && refreshToken) {
        await supabaseClient.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken
        });

        history.replaceState(null, '', window.location.pathname);
      }

      const result = await supabaseClient.auth.getSession();
      const session = result && result.data ? result.data.session : null;

      if (!session) {
        showMessage('This reset link is invalid or has expired. Please request a new password reset email.', 'error');
        submitBtn.disabled = true;
      }
    }

    form.addEventListener('submit', async function(event) {
      event.preventDefault();

      const password = newPassword.value.trim();
      const confirm = confirmPassword.value.trim();

      if (password.length < 8) {
        showMessage('Password must be at least 8 characters long.', 'error');
        return;
      }

      if (password !== confirm) {
        showMessage('Passwords do not match.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';

      const { error } = await supabaseClient.auth.updateUser({ password: password });

      if (error) {
        showMessage(error.message || 'Could not update password. Please try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update password';
        return;
      }

      showMessage('Password updated successfully. Redirecting you to sign in...', 'success');

      await supabaseClient.auth.signOut();

      setTimeout(function() {
        window.location.href = '/dashboard?password_reset=success';
      }, 1400);
    });

    ensureRecoverySession();
  </script>
</body>
</html>
