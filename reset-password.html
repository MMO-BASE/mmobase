<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | MMOBase</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #050505;
      color: #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .auth-modal {
      width: 100%;
      max-width: 440px;
      background: #ffffff;
      border-radius: 22px;
      padding: 42px 48px 46px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      position: relative;
    }

    .close-modal {
      position: absolute;
      top: 22px;
      right: 24px;
      width: 30px;
      height: 30px;
      border: 0;
      background: transparent;
      color: #6b6b6b;
      font-size: 30px;
      line-height: 1;
      cursor: pointer;
      font-weight: 300;
    }

    .close-modal:hover {
      color: #111;
    }

    .brand {
      text-align: center;
      margin-bottom: 26px;
    }

    .brand img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    h1 {
      text-align: center;
      font-size: 32px;
      line-height: 1.12;
      margin-bottom: 10px;
      letter-spacing: -0.04em;
      color: #222;
    }

    .subtitle {
      text-align: center;
      color: #6f6f6f;
      line-height: 1.45;
      margin-bottom: 34px;
      font-size: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin: 18px 0 8px;
      color: #2b2b2b;
    }

    input {
      width: 100%;
      height: 50px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1.5px solid #d7d7d7;
      background: #ffffff;
      color: #1f1f1f;
      outline: none;
      font-size: 15px;
    }

    input:focus {
      border-color: #1f1f1f;
      box-shadow: 0 0 0 3px rgba(31, 31, 31, 0.06);
    }

    .submit-btn {
      width: 100%;
      margin-top: 26px;
      border: 0;
      border-radius: 12px;
      height: 54px;
      background: #1d1d1d;
      color: #ffffff;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .submit-btn:hover {
      background: #111111;
      transform: translateY(-1px);
    }

    .submit-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .forgot-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      color: #6b7cff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .message {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.45;
      display: none;
    }

    .message.error {
      display: block;
      color: #991b1b;
      background: #fee2e2;
      border: 1px solid #fecaca;
    }

    .message.success {
      display: block;
      color: #166534;
      background: #dcfce7;
      border: 1px solid #bbf7d0;
    }

    @media (max-width: 520px) {
      body {
        padding: 18px;
      }

      .auth-modal {
        padding: 36px 28px 38px;
      }

      h1 {
        font-size: 29px;
      }
    }
  </style>
</head>
<body>
  <main class="auth-modal">
    <button class="close-modal" onclick="window.location.href='/'">&times;</button>

    <div class="brand">
      <img src="/favicon.png" alt="MMOBase">
      <h1>Reset your password</h1>
      <p class="subtitle">Enter a new password below. Once updated, you’ll be sent back to sign in.</p>
    </div>

    <form id="resetForm">
      <label for="newPassword">New password</label>
      <input id="newPassword" type="password" minlength="8" autocomplete="new-password" required>

      <label for="confirmPassword">Confirm new password</label>
      <input id="confirmPassword" type="password" minlength="8" autocomplete="new-password" required>

      <button id="submitBtn" class="submit-btn" type="submit">Update password</button>
    </form>

    <div id="message" class="message"></div>

    <a class="forgot-link" href="/?auth=signin">Back to sign in</a>
  </main>

  <script>
    const SUPABASE_URL = 'https://rfswlpozpwcrlnpymbsr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmc3dscG96cHdjcmxucHltYnNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg1NDk3MTcsImV4cCI6MjA4NDEyNTcxN30._5pxb0WCJ0FBQ0_DA8BJjm5jCA9nxVDBn8IOGRjKnoI';
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('resetForm');
    const newPassword = document.getElementById('newPassword');
    const confirmPassword = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const message = document.getElementById('message');

    function showMessage(text, type) {
      message.textContent = text;
      message.className = 'message ' + type;
    }

    async function ensureRecoverySession() {
      const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      const accessToken = hash.get('access_token');
      const refreshToken = hash.get('refresh_token');

      if (accessToken && refreshToken) {
        await supabaseClient.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken
        });

        history.replaceState(null, '', window.location.pathname);
      }

      const result = await supabaseClient.auth.getSession();
      const session = result && result.data ? result.data.session : null;

      if (!session) {
        showMessage('This reset link is invalid or has expired. Please request a new password reset email.', 'error');
        submitBtn.disabled = true;
      }
    }

    form.addEventListener('submit', async function(event) {
      event.preventDefault();

      const password = newPassword.value.trim();
      const confirm = confirmPassword.value.trim();

      if (password.length < 8) {
        showMessage('Password must be at least 8 characters long.', 'error');
        return;
      }

      if (password !== confirm) {
        showMessage('Passwords do not match.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';

      const { error } = await supabaseClient.auth.updateUser({ password: password });

      if (error) {
        showMessage(error.message || 'Could not update password. Please try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update password';
        return;
      }

      showMessage('Password updated successfully. Redirecting you to sign in...', 'success');

      await supabaseClient.auth.signOut();

      setTimeout(function() {
        window.location.href = '/?auth=signin&password_reset=success';
      }, 1300);
    });

    ensureRecoverySession();
  </script>
</body>
</html>
